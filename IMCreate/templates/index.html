{% extends 'base.html' %}
{% block title %}Home Page{% endblock %}
{% block content %}
    <form method="POST">
        {% csrf_token %} {{ form.as_p }}
        <div>
            <label for="Tags">Tags</label>
            <input type="text" id="tags" name="tags" value="{{ tags_query }}"/>
        </div>
        <button type="submit">Search</button>
            {% for post in posts %}
                {% include "components/post.html" %}
            {% endfor %}
    </form>
{% endblock %}
