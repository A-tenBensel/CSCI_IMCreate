{% extends 'base.html' %}
{% block title %}Home Page{% endblock %}
{% block content %}
    <form method="GET">
        {{ form.as_p }}
        <div>
            <label for="Tags">Tags</label>
            <input type="text" id="tags" name="tags" value="{{ tags_query }}"/>
        </div>
        <button type="submit">Search</button>
      </form>
      {% for post in posts %}
          {% include "components/post.html" with post=post %}
      {% endfor %}
{% endblock %}
