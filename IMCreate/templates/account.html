{% extends 'base.html' %}
{% block title %}User Settings{% endblock %}

{% block content %}
<h1>Create User Account</h1>
<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  <p>About Me: {{ form.about_me }}</p>
  {% if pfp %}
  <img src="{{ pfp.url }}" alt="No profile pic">
  {% endif %}
  <p>Profile Pic: {{ form.profile_pic }}</p>
  <button type="submit">Save User</button>
</form>
{% endblock %}
